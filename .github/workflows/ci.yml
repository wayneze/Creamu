name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check:dist

  privacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject local-only artifacts
        shell: bash
        run: |
          set -euo pipefail
          tracked_private=$(git ls-files | grep -E '(^|/)(private|\.local|\.notes)(/|$)|\.local\.' || true)
          if [[ -n "$tracked_private" ]]; then
            echo "Local-only artifacts must not be tracked:"
            echo "$tracked_private"
            exit 1
          fi
